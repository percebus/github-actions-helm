name: Test actions/setup

on:
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  default:
    runs-on: ubuntu-latest
    steps:
      - uses: percebus/github-actions-common/.github/actions/checkout@main

      # before setup
      - name: helm version
        run: helm version

      # includes helm version
      - uses: ./.github/actions/setup

  os__matrix:
    needs: default
    strategy:
      fail-fast: false
      matrix:
        runs-on:
          # - ubuntu-latest  # already tested in default
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.runs-on }}
    name: setup @ ${{ matrix.runs-on }}
    steps:
      # before setup
      - name: helm version
        run: helm version

      # includes helm version
      - uses: ./.github/actions/setup

      # before setup
      - name: helm version
        run: helm version

      # includes helm version
      - uses: ./.github/actions/setup
